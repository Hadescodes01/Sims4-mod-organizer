name: Build Windows EXE

# Runs automatically every time you upload/change files in this repo.
# You can also trigger it manually from the "Actions" tab ("Run workflow").
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build Sims4ModOrganizer.exe
        run: pyinstaller --onefile --windowed --name "Sims4ModOrganizer" sims4_mod_organizer.py

      - name: Upload the finished exe
        uses: actions/upload-artifact@v4
        with:
          name: Sims4ModOrganizer-Windows
          path: dist/Sims4ModOrganizer.exe
